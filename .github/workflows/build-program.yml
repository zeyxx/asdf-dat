name: Build Solana Program

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build using Anchor 0.26.0
        run: |
          # Install Solana CLI from GitHub (use v1.18.18 for OpenSSL 3 support)
          cd ~
          wget -q https://github.com/solana-labs/solana/releases/download/v1.18.18/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar jxf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          export PATH="$HOME/solana-release/bin:$PATH"
          solana --version

          # Install Rust 1.76.0 explicitly
          rustup install 1.76.0
          rustup default 1.76.0
          rustc --version

          # Install Anchor 0.26.0 via npm (much simpler than compiling from source)
          npm install -g @coral-xyz/anchor-cli@0.26.0

          # Build with Anchor
          cd $GITHUB_WORKSPACE
          anchor build

      - name: List artifacts
        run: |
          ls -lh target/deploy/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-binary
          path: target/deploy/asdf_dat.so
