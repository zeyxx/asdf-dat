name: Build Solana Program

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/*

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build using Solana CLI directly
        run: |
          # Install Solana CLI from GitHub (use v1.18.18 for OpenSSL 3 support)
          cd ~
          wget -q https://github.com/solana-labs/solana/releases/download/v1.18.18/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar jxf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          export PATH="$HOME/solana-release/bin:$PATH"
          solana --version

          # Build the BPF program (using cargo-build-sbf, not deprecated bpf)
          cd $GITHUB_WORKSPACE/programs/asdf-dat
          cargo build-sbf

      - name: List artifacts
        run: |
          ls -lh target/deploy/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-binary
          path: target/deploy/asdf_dat.so
